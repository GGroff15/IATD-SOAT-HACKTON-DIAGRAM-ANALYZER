version: "3.9"

services:
  diagram-analyzer-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: diagram-analyzer-service:latest
    ports:
      - "8001:8000"
    env_file:
      - .docker.env
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/openapi.json > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

networks:
  default:
    external: true
    name: soat-net
