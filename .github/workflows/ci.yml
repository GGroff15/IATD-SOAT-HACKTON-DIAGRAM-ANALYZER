name: CI/CD - Diagram Analyzer

on:
  pull_request:
    branches:
      - main

jobs:
  run_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        run: pip install uv

      - name: Cache UV
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Setup environment
        run: cp .env.example .env

      - name: Run unit tests with coverage
        run: uv run pytest tests/unit/ --cov=app --cov-report=term-missing --cov-fail-under=80

  build_and_push:
    needs: run_tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e push no Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/soat-diagram-analyzer:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/soat-diagram-analyzer:latest
