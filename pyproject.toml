[project]
name = "diagram-analyzer-service"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "boto3>=1.42.65",
    "opencv-python>=4.13.0.92",
    "pdf2image>=1.17.0",
    "poppler-utils>=0.1.0",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.13.1",
